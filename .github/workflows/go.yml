name: sql-migrator-otus
run-name: ${{ github.actor }} SQL Migrator Tools Project

on:
  push:
    branches:
      - master
      - main
      - develop
      - dev

env:
  GO111MODULE: "on"
  POSTGRES_DB: "test_db"
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "password"
  DB_DSN: "postgresql://user:password@localhost:5432/test_db?sslmode=disable"
  MIGRATIONS_DIR: "./migrations"

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ~1.22

      - name: Create config file
        run: |
          cat <<EOF > config.yaml
          migrator:
            dsn: "$DB_DSN"
            dir: "$MIGRATIONS_DIR"
            type: "sql"
            table_name: "schema_migrations"
          logger:
            level: "INFO"
          EOF

      - name: Create test migrations
        run: |
          mkdir -p $MIGRATIONS_DIR
          echo "CREATE TABLE IF NOT EXISTS test_table (id SERIAL PRIMARY KEY);" > $MIGRATIONS_DIR/0001_test_up.sql
          echo "DROP TABLE IF EXISTS test_table;" > $MIGRATIONS_DIR/0001_test_down.sql

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ~1.22

      - name: Check out code
        uses: actions/checkout@v4

      - name: Linters
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.64.8
          working-directory: ./

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Extract branch name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.22

      - name: Check out code
        uses: actions/checkout@v4

      - name: Unit tests
        run: go test -v -count=100 -race -timeout=1m ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
        working-directory: ./

      - name: Optimization tests
        run: go test -v -count=1 -timeout=1m -tags bench ./...
        working-directory: ./

      - name: Bash tests
        shell: bash
        run: ./test.sh
        if: ${{ hashFiles('./test.sh') != '' }}
        working-directory: ./


  unit-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: go version

      - name: Unit tests
        run: go test -v -count=1 -race -timeout=1m ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3

  integration-tests:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - run: go version

      - name: Wait for PostgreSQL
        run: sleep 10

      - name: Run integration tests
        run: |
          go test -v -count=1 -timeout=2m -tags integration ./...

  command-tests:
    needs: [setup, integration-tests]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - run: go version

      - name: Build migrator
        run: go build -o ./bin/gomigrator ./cmd/gomigrator

      - name: Test create command
        run: |
          ./bin/gomigrator create test_migration
          [ -f "$MIGRATIONS_DIR/0002_test_migration_up.sql" ] || exit 1
          [ -f "$MIGRATIONS_DIR/0002_test_migration_down.sql" ] || exit 1

      - name: Test up command
        run: |
          ./bin/gomigrator up
          ./bin/gomigrator status

      - name: Verify migration applied
        run: |
          psql $DB_DSN -c "SELECT tablename FROM pg_tables WHERE tablename = 'test_table';" | grep test_table

      - name: Test down command
        run: |
          ./bin/gomigrator down
          ./bin/gomigrator status

      - name: Verify migration rolled back
        run: |
          ! psql $DB_DSN -c "SELECT tablename FROM pg_tables WHERE tablename = 'test_table';" | grep test_table

      - name: Test redo command
        run: |
          ./bin/gomigrator redo
          ./bin/gomigrator status

      - name: Test status command
        run: ./bin/gomigrator status

      - name: Test dbversion command
        run: ./bin/gomigrator dbversion

  makefile-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: go version

      - name: Install psql
        run: sudo apt-get -yqq install postgresql-client

      - name: Run Makefile tests
        run: |
          make build
          make test
          MIGRATION_NAME=test_migration make migrate-create
          DSN="$DB_DSN" make migrate-up
          DSN="$DB_DSN" make migrate-status
          DSN="$DB_DSN" make migrate-dbversion
          DSN="$DB_DSN" make migrate-down
          DSN="$DB_DSN" make migrate-redo

  tests_by_makefile:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.22

      - name: Check out code
        uses: actions/checkout@v4

      - name: make build
        run: make build
        working-directory: ./

      - name: make test
        run: make test
        working-directory: ./

