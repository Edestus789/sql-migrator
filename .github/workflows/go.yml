name: sql-migrator-otus
run-name: ${{ github.actor }} SQL Migrator Tools Project

on:
  push:
    branches: [master, main, develop, dev]
  pull_request:

env:
  GO111MODULE: on
  POSTGRES_DB: test_db
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
  DB_DSN: postgresql://user:password@localhost:5432/test_db?sslmode=disable
  MIGRATIONS_DIR: ./migrations

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ~1.22

      - name: Check out code
        uses: actions/checkout@v4

      - name: Linters
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.64.8
          working-directory: ./

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Extract branch name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.22

      - name: Check out code
        uses: actions/checkout@v4

      - name: Unit tests
        run: go test -v -count=100 -race -timeout=1m ./... -coverprofile=./cover.out -covermode=atomic -coverpkg=./...
        working-directory: ./

      - name: Optimization tests
        run: go test -v -count=1 -timeout=1m -tags bench ./...
        working-directory: ./

      - name: Bash tests
        shell: bash
        run: ./test.sh
        if: ${{ hashFiles('./test.sh') != '' }}
        working-directory: ./

  tests_by_makefile:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.22

      - name: Check out code
        uses: actions/checkout@v4

      - name: make build
        run: make build
        working-directory: ./

      - name: make test
        run: make test
        working-directory: ./

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: ~1.22

      - name: Setup test env
        run: |
          mkdir -p $MIGRATIONS_DIR
          echo "migrator:\n  dsn: \"$DB_DSN\"\n  dir: \"$MIGRATIONS_DIR\"" > config.yaml

      - name: Run tests
        run: |
          go test -v -race ./...
          go test -v -tags=integration ./...

  makefile-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: ~1.22

      - name: Install psql
        run: sudo apt-get -yqq install postgresql-client

      - name: Test Makefile
        run: |
          make build
          make migrate-create
          DSN="$DB_DSN" make migrate-up
          DSN="$DB_DSN" make migrate-status
          DSN="$DB_DSN" make migrate-down